baseURL: "https://miuyou.github.io/Blog/"
languageCode: "zh-CN"
defaultContentLanguage: "zh-cn"
title: "Spring Blog"
theme: "hugo-theme-reimu"

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

pagination:
  pagerSize: 10

languages:
  zh-cn:
    languageName: "简体中文"
    weight: 1
    hasCJKLanguage: true

markup:
  goldmark:
    extensions:
      passthrough:
        enable: true
        delimiters:
          block:
            - ["\\[", "\\]"]
            - ["$$", "$$"]
          inline:
            - ["\\(", "\\)"]
            - ["$", "$"]
  highlight:
    guessSyntax: true
    noClasses: false

outputs:
  home:
    - Algolia
    - HTML
    - RSS

outputFormats:
  Algolia:
    baseName: "algolia"
    isPlainText: true
    mediaType: "application/json"
    notAlternative: true

params:
  menu:
    - name: home
      url: ""
    - name: archives
      url: "archives"
    - name: tag
      url: "tags"

  mainSections:
    - posts
  author: "Spring"
  description: "这里是我的博客，记录算法、学习与生活。"
  subtitle:
    text: "你好，我是 Spring"

  banner: "images/hero/home-bg.png"
  avatar: "avatar.png"
  cover: "images/hero/home-bg.png"

  sidebar:
    position: "right"
    menu: true
    article:
      show_common: true

  social:
    github: "https://github.com/Miuyou"

  footer:
    since: 2019
    powered: true
    count: true
    busuanzi: true

  injector:
    head_end: |
      <link rel="icon" type="image/png" href="/Blog/avatar/avatar.png">
      <link rel="apple-touch-icon" href="/Blog/avatar/avatar.png">
      <link rel="stylesheet" href="/Blog/css/custom.css">
    body_end: |
      <script defer src="/Blog/js/archive-filter.js"></script>
